<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon Clone</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#eaeded;
    }

    /* Navbar */
    .navbar{
      background:#131921;
      color:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#ff9900;
    }

    .search-box{
      flex:1;
      margin:0 20px;
      display:flex;
    }

    .search-box input{
      width:100%;
      padding:10px;
      border:none;
      outline:none;
    }

    .search-box button{
      background:#febd69;
      border:none;
      padding:10px 15px;
      cursor:pointer;
    }

    .nav-links{
      display:flex;
      gap:20px;
      font-size:14px;
    }

    /* Hero Section */
    .hero{
      background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30')
      center/cover no-repeat;
      height:350px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-bottom:30px;
      color:white;
      font-size:32px;
      font-weight:bold;
    }

    /* Products */
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      text-align:center;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:8px;
    }

    .card h3{
      margin:15px 0;
    }

    .price{
      color:green;
      font-size:20px;
      margin-bottom:10px;
    }

    .card button{
      background:#ffd814;
      border:none;
      padding:10px 15px;
      border-radius:20px;
      cursor:pointer;
      font-weight:bold;
    }

    /* Footer */
    footer{
      background:#232f3e;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">amazon</div>

    <div class="search-box">
      <input type="text" placeholder="Search products...">
      <button>🔍</button>
    </div>

    <div class="nav-links">
      <div>Hello, Sign in</div>
      <div>Returns & Orders</div>
      <div>Cart 🛒</div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    Welcome to Amazon Clone
  </div>

  <!-- Products -->
  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="">
      <h3>Smart Phone</h3>
      <div class="price">$499</div>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f" alt="">
      <h3>Camera</h3>
      <div class="price">$799</div>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" alt="">
      <h3>Headphones</h3>
      <div class="price">$149</div>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="">
      <h3>Shoes</h3>
      <div class="price">$89</div>
      <button>Add to Cart</button>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    © 2026 Amazon Clone | Made with HTML & CSS
  </footer>

</body>
</html>
